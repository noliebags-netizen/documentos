<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de Documentos - FADMINAS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1a; --surface: #242424; --header-bg: #1e1e1e;
    --accent: #c8a252; --text: #f0f0f0; --text-muted: #999;
    --border: #333; --shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; }
  .header {
    background: var(--header-bg); border-bottom: 1px solid #2e2e2e;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  .back-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border);
    background: transparent; color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .back-btn svg { width: 15px; height: 15px; }
  .header-info { flex: 1; min-width: 0; }
  .header-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; line-height: 1.2; }
  .logo-fadminas { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .logo-icon { width: 32px; height: 32px; }
  .logo-colegio { font-size: 7px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .logo-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); }
  .toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .tool-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: 'Barlow', sans-serif;
    font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .tool-btn svg { width: 13px; height: 13px; }
  .page-info { font-size: 12px; color: var(--text-muted); padding: 5px 6px; }
  .spacer { flex: 1; }
  .main { padding: 16px 10px 40px; display: flex; flex-direction: column; align-items: center; }
  .badge-valid {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(46,160,67,.12); border: 1px solid rgba(46,160,67,.35);
    color: #4caf50; padding: 7px 16px; border-radius: 40px;
    font-size: 12px; font-weight: 600; margin-bottom: 16px;
  }
  .badge-valid svg { width: 14px; height: 14px; }
  .pdf-container { width: 100%; max-width: 860px; }
  .pdf-page {
    width: 100%; background: #fff; border-radius: 4px;
    box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; position: relative;
  }
  .pdf-page canvas { width: 100% !important; height: auto !important; display: block; }
  .page-badge {
    position: absolute; bottom: 10px; right: 12px;
    background: rgba(0,0,0,.45); color: #fff; font-size: 10px;
    padding: 2px 7px; border-radius: 20px;
  }
  .loading-msg { color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px; }
  .footer {
    text-align: center; padding: 18px; border-top: 1px solid var(--border);
    color: var(--text-muted); font-size: 11px; background: var(--header-bg);
  }
  .footer strong { color: var(--accent); }
</style>
</head>
<body>
<header class="header">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="header-info">
    <div class="header-label">Pertence ao acervo:</div>
    <div class="header-title">COLÉGIO ADVENTISTA - FADMINAS</div>
  </div>
  <div class="logo-fadminas">
    <svg class="logo-icon" viewBox="0 0 44 44" fill="none">
      <rect width="44" height="44" rx="8" fill="#1a1a2e"/>
      <path d="M22 6 L36 38 H28 L22 24 L16 38 H8 L22 6Z" fill="#c8a252" opacity="0.9"/>
      <rect x="12" y="26" width="20" height="3" rx="1.5" fill="#e8c47a"/>
    </svg>
    <div>
      <div class="logo-colegio">Colégio Adventista</div>
      <div class="logo-name">FADMINAS</div>
    </div>
  </div>
</header>
<div class="toolbar">
  <button class="tool-btn" onclick="zoomOut()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Diminuir
  </button>
  <span class="page-info" id="zoom-label">100%</span>
  <button class="tool-btn" onclick="zoomIn()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Aumentar
  </button>
  <div class="spacer"></div>
  <button class="tool-btn" id="download-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </button>
</div>
<main class="main">
  <div class="badge-valid">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Documento Autêntico · Verificado
  </div>
  <div class="pdf-container" id="pdf-container">
    <div class="loading-msg">Carregando documento...</div>
  </div>
</main>
<footer class="footer">
  Documento emitido e validado pelo <strong>Colégio Adventista - FADMINAS</strong> · Lavras - MG
</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  const PDF_URL = 'HISTORICO_001409.pdf';
  let pdfDoc = null, scale = 1.5;
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const container = document.getElementById('pdf-container');
  async function renderPDF() {
    container.innerHTML = '<div class="loading-msg">Carregando...</div>';
    try {
      pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
      container.innerHTML = '';
      for (let n = 1; n <= pdfDoc.numPages; n++) {
        const page = await pdfDoc.getPage(n);
        const vp = page.getViewport({ scale });
        const wrap = document.createElement('div');
        wrap.className = 'pdf-page';
        const canvas = document.createElement('canvas');
        canvas.width = vp.width;
        canvas.height = vp.height;
        const badge = document.createElement('div');
        badge.className = 'page-badge';
        badge.textContent = n + '/' + pdfDoc.numPages;
        wrap.appendChild(canvas);
        wrap.appendChild(badge);
        container.appendChild(wrap);
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      }
    } catch(e) {
      container.innerHTML = '<div class="loading-msg">Erro ao carregar o documento.</div>';
    }
  }
  function zoomIn() { scale = Math.min(scale + 0.3, 4); updateZoom(); }
  function zoomOut() { scale = Math.max(scale - 0.3, 0.5); updateZoom(); }
  function updateZoom() {
    document.getElementById('zoom-label').textContent = Math.round(scale / 1.5 * 100) + '%';
    renderPDF();
  }
  document.getElementById('download-btn').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = PDF_URL;
    a.download = 'Historico_Escolar_FADMINAS.pdf';
    a.click();
  });
  renderPDF();
</script>
</body>
</html>
